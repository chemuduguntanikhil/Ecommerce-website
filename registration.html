<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClickMart Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9800,#ffb74d);
}

.register-box{
    background:#fff;
    padding:40px;
    border-radius:15px;
    width:380px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.register-box h1{
    margin-bottom:20px;
    color:#333;
}

.input-box{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

.register-btn{
    width:100%;
    padding:12px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.register-btn:hover{
    background:#e68900;
}

.login-link{
    margin-top:15px;
    display:block;
    text-decoration:none;
    color:#555;
}
</style>
</head>
<body>

<div class="register-box">
    <h1>ClickMart Register</h1>

    <form>
        <input type="text" placeholder="Full Name" class="input-box" required>

        <input type="email" placeholder="Email Address" class="input-box" required>

        <input type="password" placeholder="Password" class="input-box" required>

        <input type="password" placeholder="Confirm Password" class="input-box" required>

        <button type="submit" class="register-btn">
            Register
        </button>
    </form>

    <a href="login.html" class="login-link">
        Already have an account? Login
    </a>
</div>

</body>
</html>
